services:
  - type: web
    name: automl-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: FRONTEND_URL
        fromGroup: frontend-config
      - key: MONGO_URI
        fromGroup: db-config
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_API_URL
        value: https://automl-ml.onrender.com/api/analyze-csv
      - key: OPENROUTER_API_KEY
        fromGroup: api-keys
        
  - type: web
    name: automl-ml
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
